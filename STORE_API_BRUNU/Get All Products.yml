info:
  name: Get All Products
  type: http
  seq: 1

http:
  method: GET
  url: "{{store_api}}?name=so&featured=true&company=marcosd"
  params:
    - name: name
      value: so
      type: query
    - name: featured
      value: "true"
      type: query
    - name: company
      value: marcosd
      type: query
    - name: page
      value: f
      type: query
      disabled: true
    - name: sort
      value: name
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
